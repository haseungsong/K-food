<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Check-in rapido para visitantes do evento.">
  <title>Check-in Rapido</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html" data-route="index">
        <div class="brand-badge">K</div>
        <div class="brand-copy">
          <div class="brand-name">Check-in Rápido</div>
          <div class="brand-sub">Entrada em poucos segundos</div>
        </div>
      </a>
    </header>

    <main class="stack">
      <section class="panel content-panel">
        <div class="eyebrow">Passo 1</div>
        <h1 class="section-title">Digite seus dados</h1>
        <p class="hero-text">Preencha nome e WhatsApp para entrar no evento.</p>

        <form class="form-stack" id="step1-form" data-step1-form>
          <div class="field-group">
            <label class="field-label" for="name">Nome</label>
            <input class="input" id="name" name="name" type="text" placeholder="Seu nome" autocomplete="name" required>
          </div>

          <div class="field-group">
            <label class="field-label" for="whatsapp">WhatsApp</label>
            <input class="input" id="whatsapp" name="whatsapp" type="tel" placeholder="11 99999 9999" required>
          </div>

          <button class="button button-primary button-full" type="submit">Continuar</button>
          <div class="status-inline" data-form-status aria-live="polite"></div>
        </form>
      </section>

      <section class="panel content-panel">
        <div class="mini-info-grid">
          <div class="mini-info-card">
            <strong>Rápido</strong>
            <span>Somente 2 campos</span>
          </div>
          <div class="mini-info-card">
            <strong>Depois</strong>
            <span>Pesquisa e sorteio</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="mobile-sticky-bar">
    <div class="mobile-sticky-shell">
      <div class="mobile-sticky-actions">
        <button class="button button-primary" type="submit" form="step1-form">Continuar</button>
      </div>
    </div>
  </div>
</body>
</html>
